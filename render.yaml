services:
  - type: web
    name: njangi-trust-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: njangi-trust-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: ""

databases:
  - name: njangi-trust-db
    databaseName: njangi_trust
    plan: free
